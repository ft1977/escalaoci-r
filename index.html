<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación de Seguimiento Clínico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <!-- Pantalla de Bienvenida -->
    <div id="welcome-screen" class="max-w-md w-full bg-white rounded-xl shadow-lg p-8 text-center transition-all duration-500">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">Evaluación de Seguimiento Clínico</h1>
        <p class="text-gray-600 mb-8">Esta evaluación consta de 10 preguntas breves sobre sus experiencias recientes. Sus respuestas son confidenciales y serán enviadas directamente a su psicólogo.</p>
        <button onclick="startAssessment()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 px-6 rounded-lg shadow transition duration-200 text-lg">
            Comenzar
        </button>
    </div>

    <!-- Pantalla de Preguntas -->
    <div id="question-screen" class="max-w-md w-full bg-white rounded-xl shadow-lg p-6 hidden">
        <div class="mb-6">
            <div class="flex justify-between items-center mb-4">
                <span id="progress-text" class="text-sm font-medium text-gray-500">Pregunta 1 de 10</span>
                <div class="w-1/2 bg-gray-200 rounded-full h-2">
                    <div id="progress-bar" class="bg-blue-600 h-2 rounded-full" style="width: 10%"></div>
                </div>
            </div>
            <h2 id="question-text" class="text-xl font-semibold text-gray-800 leading-relaxed min-h-[5rem]">
                <!-- La pregunta se insertará aquí -->
            </h2>
        </div>

        <div class="space-y-3">
            <button onclick="recordAnswer(0)" class="w-full text-left bg-gray-50 hover:bg-blue-50 border border-gray-200 hover:border-blue-300 p-4 rounded-lg transition duration-200 group">
                <span class="font-bold text-blue-600 mr-2 group-hover:text-blue-700">0</span> <span class="text-gray-700 group-hover:text-blue-900">Nada</span>
            </button>
            <button onclick="recordAnswer(1)" class="w-full text-left bg-gray-50 hover:bg-blue-50 border border-gray-200 hover:border-blue-300 p-4 rounded-lg transition duration-200 group">
                <span class="font-bold text-blue-600 mr-2 group-hover:text-blue-700">1</span> <span class="text-gray-700 group-hover:text-blue-900">Un poco</span>
            </button>
            <button onclick="recordAnswer(2)" class="w-full text-left bg-gray-50 hover:bg-blue-50 border border-gray-200 hover:border-blue-300 p-4 rounded-lg transition duration-200 group">
                <span class="font-bold text-blue-600 mr-2 group-hover:text-blue-700">2</span> <span class="text-gray-700 group-hover:text-blue-900">Moderadamente</span>
            </button>
            <button onclick="recordAnswer(3)" class="w-full text-left bg-gray-50 hover:bg-blue-50 border border-gray-200 hover:border-blue-300 p-4 rounded-lg transition duration-200 group">
                <span class="font-bold text-blue-600 mr-2 group-hover:text-blue-700">3</span> <span class="text-gray-700 group-hover:text-blue-900">Mucho</span>
            </button>
            <button onclick="recordAnswer(4)" class="w-full text-left bg-gray-50 hover:bg-blue-50 border border-gray-200 hover:border-blue-300 p-4 rounded-lg transition duration-200 group">
                <span class="font-bold text-blue-600 mr-2 group-hover:text-blue-700">4</span> <span class="text-gray-700 group-hover:text-blue-900">Muchísimo</span>
            </button>
        </div>
    </div>

    <!-- Pantalla Final (Carga) -->
    <div id="loading-screen" class="max-w-md w-full bg-white rounded-xl shadow-lg p-8 text-center hidden">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
        <h2 class="text-2xl font-bold text-gray-800 mb-2">Procesando...</h2>
        <p class="text-gray-600">Generando enlace seguro para envío.</p>
    </div>

    <script>
        const questions = [
            "He guardado tantas cosas que se me hace difícil organizar mi espacio.",
            "Reviso las cosas más a menudo de lo necesario.",
            "Me siento en la necesidad de repetir ciertos números o palabras para evitar que pasen cosas malas.",
            "Me lavo las manos más a menudo o durante más tiempo del necesario.",
            "Me molesta mucho si mis cosas no están colocadas exactamente como yo quiero.",
            "Me vienen a la mente pensamientos desagradables contra mi voluntad y no puedo deshacerme de ellos.",
            "Me cuesta mucho tirar las cosas.",
            "Compruebo repetidamente puertas, ventanas, cajones, etc.",
            "Siento que tengo que hacer cosas de una manera exacta o con un número de veces específico.",
            "Siento mis manos sucias si toco cosas que otra gente ha tocado."
        ];

        let currentQuestionIndex = 0;
        let totalScore = 0;

        const welcomeScreen = document.getElementById('welcome-screen');
        const questionScreen = document.getElementById('question-screen');
        const loadingScreen = document.getElementById('loading-screen');
        const questionText = document.getElementById('question-text');
        const progressText = document.getElementById('progress-text');
        const progressBar = document.getElementById('progress-bar');

        function startAssessment() {
            welcomeScreen.classList.add('hidden');
            questionScreen.classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            questionText.textContent = questions[currentQuestionIndex];
            progressText.textContent = `Pregunta ${currentQuestionIndex + 1} de ${questions.length}`;
            progressBar.style.width = `${((currentQuestionIndex + 1) / questions.length) * 100}%`;
        }

        function recordAnswer(value) {
            totalScore += value;
            currentQuestionIndex++;

            if (currentQuestionIndex < questions.length) {
                // Pequeña animación de transición
                questionScreen.classList.add('opacity-50');
                setTimeout(() => {
                    showQuestion();
                    questionScreen.classList.remove('opacity-50');
                }, 200);
            } else {
                finishAssessment();
            }
        }

        function finishAssessment() {
            questionScreen.classList.add('hidden');
            loadingScreen.classList.remove('hidden');

            // Análisis de resultados
            const analysis = totalScore >= 21 
                ? "Indicativo de posibles síntomas de TOC." 
                : "Síntomas por debajo del umbral clínico.";

            // Construcción del mensaje para WhatsApp
            const psychologistNumber = "573216284300";
            const message = `Hola Psicólogo Fabio, he completado mi evaluación. [Código interno de sistema: Score Total = ${totalScore}]. Análisis: ${analysis}`;
            
            const whatsappUrl = `https://wa.me/${psychologistNumber}?text=${encodeURIComponent(message)}`;

            // Simular un pequeño retraso para "procesamiento" antes de redirigir
            setTimeout(() => {
                window.location.href = whatsappUrl;
            }, 1500);
        }
    </script>
</body>
</html>
